services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: lightcache-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - lightcache-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ML Service (includes retrain scheduler)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: lightcache-ml
    restart: unless-stopped
    environment:
      RETRAIN_INTERVAL_DAYS: ${RETRAIN_INTERVAL_DAYS:-3}
      ROLLING_WINDOW_DAYS: ${ROLLING_WINDOW_DAYS:-30}
      MIN_ROWS_TO_RETRAIN: ${MIN_ROWS_TO_RETRAIN:-1000}
      ML_SERVICE_URL: http://localhost:8000
    volumes:
      - logs_data:/app/logs # shared logs — scheduler reads from here
      - model_data:/app/model # persists retrained models
    networks:
      - lightcache-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lightcache-backend
    restart: unless-stopped
    environment:
      PORT: 9000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:8000
      ML_ENABLED: "true"
    volumes:
      - logs_data:/app/logs # shared logs — backend writes to here
    depends_on:
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    ports:
      - "9000:9000"
    networks:
      - lightcache-net

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lightcache-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lightcache-net

# Volumes
volumes:
  redis_data:
  logs_data: # shared between backend (writes) and ml-service (reads)
  model_data: # persists retrained models across container restarts

# Network
networks:
  lightcache-net:
    driver: bridge
